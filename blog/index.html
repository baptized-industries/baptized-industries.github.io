---
layout: blog
title: Blog
---
<div style="margin: 0px 40px;">
    <h1>Blog</h1>
    <ul class="posts" style="margin-left: -40px">

        {% for post in site.posts %}
            <li><span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
        {% endfor %}
    </ul>
</div>
